services:
  pokerbank.api:
    image: ${DOCKER_REGISTRY-}pokerbankapi
    build:
      context: .
      dockerfile: PokerBank.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__PokerBank: Host=pokerbank.postgres;Port=5432;Database=pokerbank;Username=pokerbank;Password=pokerbank
      OTEL_EXPORTER_OTLP_ENDPOINT: http://pokerbank.aspire-dashboard:18889
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - 5186:8080
    depends_on:
      pokerbank.postgres:
        condition: service_healthy
      pokerbank.aspire-dashboard:
        condition: service_started

  pokerbank.postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: pokerbank
      POSTGRES_USER: pokerbank
      POSTGRES_PASSWORD: pokerbank
    volumes:
      - ./.containers/postgres_data:/var/lib/postgresql
    ports:
      - 54329:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokerbank -d pokerbank"]
      interval: 5s
      timeout: 5s
      retries: 10

  pokerbank.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.0
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - 18888:18888
